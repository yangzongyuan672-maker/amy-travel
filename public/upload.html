<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amy Travel | Upload</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="upload-page">
    <main class="upload-shell">
      <a class="back-link" href="/">返回 Amy Travel</a>
      <section class="upload-hero">
        <p class="kicker">Upload Studio</p>
        <h1>管理旅行专辑</h1>
        <p>可以创建新专辑，也可以给已有专辑继续追加照片；iPhone 实况照片导出的视频可以上传到顶部视频墙，系统会压缩为无声 MP4，并尽量读取拍摄时间与位置信息。</p>
      </section>

      <section class="upload-panel">
        <label class="wide">
          管理密码
          <input id="password" type="password" autocomplete="current-password" placeholder="输入 Railway 里设置的 ADMIN_PASSWORD">
        </label>

        <label>
          上传方式
          <select id="uploadMode">
            <option value="new">创建新专辑</option>
            <option value="append">追加到已有专辑</option>
            <option value="motion">上传到顶部视频墙</option>
          </select>
        </label>

        <label id="albumSelectWrap">
          选择专辑
          <select id="albumSelect"></select>
        </label>

        <label class="new-only">
          本次旅行标题
          <input id="tripTitle" type="text" placeholder="例如：班夫国家公园">
        </label>

        <label class="new-only">
          年份
          <input id="tripYearInput" type="text" placeholder="例如：2026">
        </label>

        <label class="wide motion-only">
          视频墙地点 / 城市
          <input id="motionLocation" type="text" placeholder="例如：Tokyo、Banff、Toronto；留空则尝试读取视频 GPS">
        </label>

        <label class="wide new-only">
          本次旅行介绍
          <textarea id="tripIntro" rows="5" placeholder="简单写就可以，系统会帮你润色。"></textarea>
        </label>

        <label class="wide">
          选择照片或视频
          <input id="mediaInput" type="file" accept="image/jpeg,image/png,image/webp,video/mp4,video/quicktime,video/webm" multiple>
        </label>

        <div class="upload-actions">
          <button id="saveButton" type="button">保存</button>
        </div>

        <p class="status" id="status">密码会保存在当前浏览器。图片会自动压缩；视频会转为无声 MP4，并保留原始横竖方向用于杂志式视频墙。</p>
      </section>

      <section class="manage-section">
        <p class="kicker">Manage</p>
        <h2>已有专辑</h2>
        <div id="albumList" class="album-list"></div>
      </section>

      <section class="manage-section">
        <p class="kicker">Motion Wall</p>
        <h2>置顶视频</h2>
        <div id="videoList" class="video-list"></div>
      </section>
    </main>

    <script src="upload.js"></script>
  </body>
</html>
